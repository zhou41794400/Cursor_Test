<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      color: #1f2937;
    }

    main {
      width: min(90%, 520px);
      padding: 48px;
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(31, 41, 55, 0.12);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 40px;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, GitHub!</h1>
    <p>这是一个简单的静态页面，用于测试提交到 GitHub。</p>
  </main>
</body>
</html>
